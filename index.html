<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Grafik Indikator Bulanan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body { font-family: sans-serif; padding: 10px; }
    #container { background: #fff; padding: 10px; }

    table {
      border-collapse: collapse;
      margin-bottom: 10px;
      font-size: 14px;
      width: 100%;
    }

    th, td {
      padding: 4px;
      text-align: center;
      border: 1px solid #ccc;
    }

    input[type="number"] {
      width: 80px;
      text-align: right;
    }

    button {
      background-color: #2ea44f;
      color: white;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    canvas {
      width: 100% !important;
      height: 420px !important;
    }
  </style>
</head>

<body>

<h3 style="text-align:center">Grafik Indikator Bulanan</h3>

<div id="container">

  <!-- PILIH BULAN & TAHUN -->
  <div style="margin-bottom:10px;">
    <label>Bulan: </label>
    <select id="bulanSelect"></select>

    <label style="margin-left:10px;">Tahun: </label>
    <select id="tahunSelect"></select>
  </div>

  <form id="dataForm">
    <table>
      <thead>
        <tr>
          <th>Indikator</th>
          <th id="labelBulanLalu">Bulan Lalu</th>
          <th id="labelBulanIni">Bulan Ini</th>
        </tr>
      </thead>
      <tbody id="formBody"></tbody>
    </table>

    <button type="submit">Tampilkan Grafik</button>
    <button type="button" id="saveBtn">Save to PNG</button>
  </form>

  <canvas id="indikatorChart"></canvas>
</div>

<script>

// ================= DATA =================
const indikator = [
  { nama: 'Angka Kontak', persen: true, target: 15, label: 'Target' },
  { nama: 'RRNS', persen: true, target: 2, label: 'Maksimal' },
  { nama: 'Prolanis Terkendali', persen: true, target: 5, label: 'Target' },
];

// ================= BULAN & TAHUN =================
const bulanList = [
  "Januari","Februari","Maret","April","Mei","Juni",
  "Juli","Agustus","September","Oktober","November","Desember"
];

const bulanSelect = document.getElementById('bulanSelect');
const tahunSelect = document.getElementById('tahunSelect');

// isi bulan
bulanList.forEach((b, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = b;
  bulanSelect.appendChild(opt);
});

// tahun otomatis sekarang + bisa ubah manual
const now = new Date();
const currentYear = now.getFullYear();

for (let y = currentYear - 2; y <= currentYear + 2; y++) {
  const opt = document.createElement('option');
  opt.value = y;
  opt.textContent = y;
  tahunSelect.appendChild(opt);
}

bulanSelect.value = now.getMonth();
tahunSelect.value = currentYear;

// ================= LABEL BULAN =================
function updateLabelBulan() {
  const bulanIni = parseInt(bulanSelect.value);
  let tahun = parseInt(tahunSelect.value);

  let bulanLalu = bulanIni - 1;
  let tahunLalu = tahun;

  if (bulanLalu < 0) {
    bulanLalu = 11;
    tahunLalu = tahun - 1;
  }

  document.getElementById('labelBulanIni').textContent =
    bulanList[bulanIni] + " " + tahun;

  document.getElementById('labelBulanLalu').textContent =
    bulanList[bulanLalu] + " " + tahunLalu;
}

bulanSelect.addEventListener('change', updateLabelBulan);
tahunSelect.addEventListener('change', updateLabelBulan);
updateLabelBulan();

// ================= FORM =================
const formBody = document.getElementById('formBody');
indikator.forEach((item, i) => {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${item.nama}</td>
    <td><input type="number" name="bulanLalu" data-index="${i}" required></td>
    <td><input type="number" name="bulanIni" data-index="${i}" required></td>
  `;
  formBody.appendChild(row);
});

// ================= CHART =================
const ctx = document.getElementById('indikatorChart').getContext('2d');

let chart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: indikator.map(i => i.nama),
    datasets: [
      { label: 'Bulan Lalu', data: [], backgroundColor: 'red' },
      { label: 'Bulan Ini', data: [], backgroundColor: 'blue' }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      datalabels: {
        anchor: 'center',
        align: 'center',
        formatter: (v, ctx) => v + (indikator[ctx.dataIndex].persen ? '%' : '')
      }
    },
    scales: {
      y: { beginAtZero: true }
    }
  },
  plugins: [ChartDataLabels]
});

// ================= SUBMIT =================
document.getElementById('dataForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const bulanLalu = [...document.getElementsByName('bulanLalu')].map(i => +i.value);
  const bulanIni = [...document.getElementsByName('bulanIni')].map(i => +i.value);

  chart.data.datasets[0].data = bulanLalu;
  chart.data.datasets[1].data = bulanIni;
  chart.update();
});

// ================= SAVE PNG =================
document.getElementById('saveBtn').addEventListener('click', () => {
  html2canvas(document.getElementById('container')).then(canvas => {

    const bulan = bulanList[bulanSelect.value];
    const tahun = tahunSelect.value;

    const link = document.createElement('a');
    link.download = `grafik_${bulan}_${tahun}.png`;
    link.href = canvas.toDataURL();
    link.click();
  });
});

</script>

</body>
</html>
