<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Grafik Indikator Bulanan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { font-family: sans-serif; padding: 10px; }
#container { background: #fff; padding: 10px; }

table {
  border-collapse: collapse;
  width: 100%;
  margin-bottom: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: center;
}

input {
  width: 90px;
  text-align: right;
}

button {
  background: #2ea44f;
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 5px;
}

canvas {
  width: 100% !important;
  height: 420px !important;
}
</style>
</head>

<body>

<h3 style="text-align:center">Grafik Indikator Bulanan</h3>

<div id="container">

<div style="margin-bottom:10px;">
  <label>Bulan:</label>
  <select id="bulanSelect"></select>

  <label style="margin-left:10px;">Tahun:</label>
  <select id="tahunSelect"></select>
</div>

<form id="dataForm">
<table>
<thead>
<tr>
<th>Indikator</th>
<th id="labelBulanLalu">Bulan Lalu</th>
<th id="labelBulanIni">Bulan Ini</th>
</tr>
</thead>
<tbody id="formBody"></tbody>
</table>

<button type="submit">Tampilkan Grafik</button>
<button type="button" id="saveBtn">Save PNG</button>
</form>

<canvas id="indikatorChart"></canvas>
</div>

<script>

// ===== PARSE ANGKA =====
function parseAngka(val) {
  if (!val) return 0;
  val = val.trim();

  if (val.includes(',') && val.includes('.')) {
    if (val.lastIndexOf(',') > val.lastIndexOf('.')) {
      val = val.replace(/\./g, '').replace(',', '.');
    } else {
      val = val.replace(/,/g, '');
    }
  } else if (val.includes(',')) {
    val = val.replace(',', '.');
  }

  return parseFloat(val) || 0;
}

// ===== DATA =====
const indikator = [
  { nama: 'Angka Kontak', persen: true, target: 15, label: 'Target' },
  { nama: 'RRNS', persen: true, target: 2, label: 'Maksimal' },
  { nama: 'Prolanis Terkendali', persen: true, target: 5, label: 'Target' },
];

// ===== BULAN =====
const bulanList = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

const bulanSelect = document.getElementById('bulanSelect');
const tahunSelect = document.getElementById('tahunSelect');

bulanList.forEach((b, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = b;
  bulanSelect.appendChild(opt);
});

const now = new Date();
const currentYear = now.getFullYear();

for (let y = currentYear - 2; y <= currentYear + 2; y++) {
  const opt = document.createElement('option');
  opt.value = y;
  opt.textContent = y;
  tahunSelect.appendChild(opt);
}

bulanSelect.value = now.getMonth();
tahunSelect.value = currentYear;

// ===== LABEL BULAN =====
function updateLabel() {
  const b = +bulanSelect.value;
  let t = +tahunSelect.value;

  let bLalu = b - 1;
  let tLalu = t;

  if (bLalu < 0) {
    bLalu = 11;
    tLalu = t - 1;
  }

  document.getElementById('labelBulanIni').textContent =
    bulanList[b] + " " + t;

  document.getElementById('labelBulanLalu').textContent =
    bulanList[bLalu] + " " + tLalu;
}

bulanSelect.onchange = updateLabel;
tahunSelect.onchange = updateLabel;
updateLabel();

// ===== FORM =====
const formBody = document.getElementById('formBody');

indikator.forEach((item, i) => {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${item.nama}</td>
    <td><input type="text" name="bulanLalu" required></td>
    <td><input type="text" name="bulanIni" required></td>
  `;
  formBody.appendChild(row);
});

// ===== CHART =====
const ctx = document.getElementById('indikatorChart').getContext('2d');

let chart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: indikator.map(i => i.nama),
    datasets: [
      {
        label: 'Bulan Lalu',
        data: [],
        backgroundColor: 'rgba(255, 99, 132, 0.7)',
        categoryPercentage: 0.5,
        barPercentage: 0.7
      },
      {
        label: 'Bulan Ini',
        data: [],
        backgroundColor: 'rgba(54, 162, 235, 0.7)',
        categoryPercentage: 0.5,
        barPercentage: 0.7
      }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { position: 'top' },
      datalabels: {
        anchor: 'center',
        align: 'center',
        formatter: (v, ctx) => v + '%',
        color: '#000',
        font: { weight: 'bold' }
      },
      annotation: { annotations: {} }
    },
    scales: {
      y: {
        beginAtZero: true,
        title: { display: true, text: 'Nilai (%)' }
      }
    }
  },
  plugins: [ChartDataLabels]
});

// ===== SUBMIT =====
document.getElementById('dataForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const bulanLalu = [...document.getElementsByName('bulanLalu')].map(i => parseAngka(i.value));
  const bulanIni = [...document.getElementsByName('bulanIni')].map(i => parseAngka(i.value));

  chart.data.datasets[0].data = bulanLalu;
  chart.data.datasets[1].data = bulanIni;

  // AUTO SCALE
  const semua = [...bulanLalu, ...bulanIni, ...indikator.map(i => i.target)];
  const max = Math.max(...semua);
  chart.options.scales.y.suggestedMax = max < 10 ? 10 : max * 1.2;

  // TARGET LINE
  const annotations = {};
  indikator.forEach((item, i) => {
    annotations['target' + i] = {
      type: 'line',
      yMin: item.target,
      yMax: item.target,
      borderColor: (i === 1) ? 'red' : 'green',
      borderWidth: 2,
      label: {
        content: `${item.label} ${item.target}%`,
        enabled: true,
        color: '#000',
        backgroundColor: 'transparent'
      },
      xMin: i - 0.4,
      xMax: i + 0.4
    };
  });

  chart.options.plugins.annotation.annotations = annotations;

  chart.update();
});

// ===== SAVE =====
document.getElementById('saveBtn').addEventListener('click', () => {
  html2canvas(document.getElementById('container')).then(canvas => {

    const bulan = bulanList[bulanSelect.value];
    const tahun = tahunSelect.value;

    const link = document.createElement('a');
    link.download = `grafik_${bulan}_${tahun}.png`;
    link.href = canvas.toDataURL();
    link.click();
  });
});

</script>

</body>
</html>
